services:
  nginx:
    image: nginx:latest
    container_name: shop_proxy
    restart: always
    ports:
      - "80:80"  # Teraz Nginx nasłuchuje na porcie 80 Twojego Ubuntu
      - "443:443"  # <--- NOWE! Nginx nasłuchuje też na porcie 443 dla HTTPS
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro  # Tu Nginx znajdzie Twoje selfsigned.crt i .key
    depends_on:
      - wordpress
    networks:
      - frontend_public

  db:
    image: mariadb:10.6
    container_name: shop_database
    restart: always
    networks:
      - backend_internal  # dla  WordPressa i Nginx
    # NIE POTRZEBUJEMY portów dla bazy, bo nie będzie dostępna zewnątrz, tylko dla WordPressa przez sieć backend_internal
      - analytics_net  # dla Metabase, jeśli kiedyś będziesz chciał, żeby Metabase miało bezpośredni dostęp do bazy (nie jest to konieczne na początek)
      - global_monitoring_net  # dla Netdata, żeby mogło monitorować bazę danych
    environment:
      MYSQL_DATABASE: wordpress_db
      MYSQL_USER: wp_user
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
      - db_data:/var/lib/mysql

  wordpress:
    image: wordpress:latest
    container_name: shop_frontend  # Zostawiamy Twoją nazwę
    restart: always
    depends_on:
      - db
    networks:
      - frontend_public
      - backend_internal
    # USUNĘLIŚMY sekcję ports: "80:80" tutaj!
    # WordPress teraz "rozmawia" z Nginxem przez sieć frontend_public
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: wp_user
      WORDPRESS_DB_PASSWORD: ${DB_PASSWORD}
      WORDPRESS_DB_NAME: wordpress_db
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
      - wp_data:/var/www/html
  certbot:
    image: certbot/certbot
    container_name: shop_certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - frontend_public
  metabase:
    image: metabase/metabase:latest
    container_name: shop_analytics
    restart: always
    ports:
      - "3000:3000"
    environment:
      - MB_DB_TYPE=h2  # Na początek Metabase użyje własnej małej bazy danych
      - MB_DB_FILE=/metabase-data/metabase.db # Dane Metabase będą przechowywane w tym wolumenie
    volumes:
      - metabase_data:/metabase-data # Wolumen dla danych Metabase
    networks:
      - frontend_public
      - analytics_net  # Metabase jest też w sieci analytics_net
      - global_monitoring_net  # Metabase jest też w sieci global_monitoring_net

networks:
  frontend_public:
  backend_internal:
    internal: true
  analytics_net:         #Nowa sieć dla Metabase 
  global_monitoring_net:  # Sieć dla Netdata, już zdefiniowana w deploy-monitoring.yml 
     external: true
     name: global_monitoring_net
volumes:
  db_data:
  wp_data:
  metabase_data: